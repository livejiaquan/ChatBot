<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot - AI Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 側邊欄 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-robot"></i> ChatBot</h2>
                <button class="btn btn-primary" id="newChatBtn">
                    <i class="fas fa-plus"></i> New Chat
                </button>
            </div>
            
            <div class="conversations-list" id="conversationsList">
                <!-- 對話列表將動態載入這裡 -->
            </div>
            
            <div class="sidebar-footer">
                <button class="btn btn-secondary" id="themeToggle">
                    <i class="fas fa-moon"></i> Dark Mode
                </button>
            </div>
        </aside>

        <!-- 主要內容區域 -->
        <main class="main-content">
            <!-- 頂部工具欄 -->
            <header class="chat-header">
                <button class="btn btn-ghost sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h3 id="currentChatTitle">Select or create a new conversation</h3>
                
                <!-- 系統狀態顯示 -->
                <div class="system-status" id="systemStatus">
                    <div class="status-item" id="modelStatus">
                        <i class="fas fa-robot"></i>
                        <span class="status-text" id="modelName">Loading...</span>
                    </div>
                    <div class="status-item" id="connectionStatus">
                        <i class="fas fa-circle status-dot" id="statusDot"></i>
                        <span class="status-text" id="connectionText">Checking...</span>
                    </div>
                </div>
                
                <div class="header-actions">
                    <button class="btn btn-ghost" id="clearChatBtn" style="display: none;">
                        <i class="fas fa-trash"></i> Clear Chat
                    </button>
                    <button class="btn btn-ghost" id="renameChatBtn" style="display: none;">
                        <i class="fas fa-edit"></i> Rename
                    </button>
                </div>
            </header>

            <!-- 聊天區域 -->
            <div class="chat-container" id="chatContainer">
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <div class="welcome-icon">
                            <i class="fas fa-robot"></i>
                        </div>
                        <h2>Welcome to ChatBot</h2>
                        <p>Start a conversation or create a new chat to begin</p>
                    </div>
                </div>

                <!-- 正在輸入指示器 -->
                <div class="typing-indicator" id="typingIndicator" style="display: none;">
                    <div class="message assistant">
                        <div class="message-avatar">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="message-content">
                            <div class="message-bubble typing-bubble">
                                <div class="typing-dots">
                                    <span></span>
                                    <span></span>
                                    <span></span>
                                </div>
                                <span class="typing-text">AI is thinking...</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 生成中的訊息容器 -->
                <div class="generating-message" id="generatingMessage" style="display: none;">
                    <!-- 動態生成的訊息將顯示在這裡 -->
                </div>
            </div>

            <!-- 輸入區域 -->
            <div class="chat-input-container" id="chatInputContainer" style="display: none;">
                <div class="chat-input">
                    <textarea 
                        id="messageInput" 
                        placeholder="Type your message here..." 
                        rows="1"
                        maxlength="2000"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" disabled>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="input-footer">
                    <span class="char-count">0/2000</span>
                    <span class="input-hint">Press Enter to send, Shift+Enter for new line</span>
                </div>
            </div>
        </main>
    </div>

    <!-- 載入動畫 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner">
            <i class="fas fa-circle-notch fa-spin"></i>
            <span>載入中...</span>
        </div>
    </div>

    <!-- 錯誤提示 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 確認對話框 -->
    <div class="modal-overlay" id="modalOverlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Confirm</h3>
                <button class="modal-close" id="modalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p id="modalMessage">Are you sure you want to perform this action?</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modalCancel">Cancel</button>
                <button class="btn btn-danger" id="modalConfirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- 重命名對話框 -->
    <div class="modal-overlay" id="renameModalOverlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3>Rename Conversation</h3>
                <button class="modal-close" id="renameModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <input type="text" id="newTitleInput" placeholder="Enter new conversation title" maxlength="255">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="renameModalCancel">Cancel</button>
                <button class="btn btn-primary" id="renameModalConfirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Socket.IO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <!-- Highlight.js for code syntax highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    
    <!-- 自定義 JavaScript -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
